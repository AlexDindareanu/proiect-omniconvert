services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tutoring
      POSTGRES_PASSWORD: tutoring
      POSTGRES_DB: tutoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: tutoring
      RABBITMQ_DEFAULT_PASS: tutoring
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  rabbitmq_data:
